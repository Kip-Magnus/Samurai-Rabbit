<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Samurai Usagi">
  <meta name="theme-color" content="#0f0e17">
  <link rel="manifest" href="manifest.json">
  <title>Samurai Usagi — The Pilgrim's Blade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0f0e17;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #game-container canvas {
      image-rendering: pixelated !important;
      image-rendering: crisp-edges !important;
    }

    /* ── Loading Screen ── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #0f0e17;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.6s ease;
    }

    #loading-screen.hidden {
      opacity: 0; pointer-events: none;
    }

    .cross-symbol {
      font-size: 64px; color: #c9a959;
      animation: pulse 2s ease-in-out infinite;
      text-shadow: 0 0 20px rgba(201,169,89,0.3);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .loading-title {
      margin-top: 24px;
      font-family: 'Times New Roman', serif;
      font-size: 18px; color: #c9a959;
      letter-spacing: 6px; text-transform: uppercase;
    }

    .loading-status {
      margin-top: 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px; color: #7a6852;
      letter-spacing: 1px;
    }

    .loading-bar-track {
      margin-top: 24px; width: 200px; height: 3px;
      background: #1a1a2e; border-radius: 2px; overflow: hidden;
    }

    .loading-bar-fill {
      width: 0%; height: 100%;
      background: #c9a959;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="cross-symbol">✝</div>
    <div class="loading-title">Samurai Usagi</div>
    <div class="loading-status" id="loading-status">Preparing the journey...</div>
    <div class="loading-bar-track">
      <div class="loading-bar-fill" id="loading-bar"></div>
    </div>
  </div>

  <!-- Game Container -->
  <div id="game-container"></div>

  <!-- Phaser 3.80 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Engine Boot -->
  <script type="module">
    import { createGame } from './engine/game.js';

    const statusEl = document.getElementById('loading-status');
    const barEl = document.getElementById('loading-bar');
    const loadingScreen = document.getElementById('loading-screen');

    function setProgress(pct, msg) {
      barEl.style.width = pct + '%';
      if (msg) statusEl.textContent = msg;
    }

    setProgress(10, 'Loading engine...');

    // Wait for Phaser to be available
    function waitForPhaser() {
      return new Promise((resolve) => {
        if (typeof Phaser !== 'undefined') return resolve();
        const check = setInterval(() => {
          if (typeof Phaser !== 'undefined') { clearInterval(check); resolve(); }
        }, 50);
      });
    }

    async function boot() {
      try {
        await waitForPhaser();
        setProgress(30, 'Phaser loaded. Initializing...');

        const game = createGame({
          parent: 'game-container',
          basePath: '',
          onReady: () => {
            setProgress(100, 'Ready.');
            setTimeout(() => {
              loadingScreen.classList.add('hidden');
              setTimeout(() => loadingScreen.remove(), 600);
            }, 400);
          },
          onError: (err) => {
            setProgress(100, 'Engine ready (data will load in-game).');
            console.warn('Boot warning:', err.message);
            setTimeout(() => {
              loadingScreen.classList.add('hidden');
              setTimeout(() => loadingScreen.remove(), 600);
            }, 1000);
          },
        });

        setProgress(50, 'Generating sprites...');

        // Expose for debugging
        window.__SAMURAI_USAGI = game;

      } catch (err) {
        console.error('Fatal boot error:', err);
        statusEl.textContent = 'Error: ' + err.message;
        statusEl.style.color = '#8b0000';
      }
    }

    boot();

    // Register service worker for offline play
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => {
        console.warn('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
