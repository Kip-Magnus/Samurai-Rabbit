<!DOCTYPE html>
<html lang="en">
<head>

<title>侍うさぎ伝説 — Legend of Samurai Usagi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;font-family:Georgia,serif;color:#e8e0d4;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh}
#c{image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges}
.ff{background:linear-gradient(180deg,#0a1832,#0d1f45 30%,#0a1832);border:2px solid #6688cc;border-radius:4px;box-shadow:0 0 0 1px #1a2a4a,inset 0 0 0 1px #3a5a8a;padding:8px 12px;position:relative}
#ts{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;cursor:pointer}
#ts.h{display:none}
.tm{font-size:clamp(2em,5vw,3.5em);font-weight:900;color:#d4a853;text-shadow:0 0 40px rgba(212,168,83,.4),0 2px 0 #6a4a10;letter-spacing:.06em;animation:tf 3s ease-in-out infinite}
.tj{font-size:clamp(.8em,2.5vw,1.4em);color:rgba(255,183,197,.7);margin-top:.3em;letter-spacing:.4em}
.ts2{font-size:clamp(.6em,1.8vw,1em);color:#8899bb;letter-spacing:.5em;margin-top:.4em}
.tst{font-size:clamp(.6em,1.4vw,.85em);color:#aabbdd;margin-top:2em;animation:pl 2s ease-in-out infinite}
@keyframes tf{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.25}}
#dlg{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);width:min(94%,640px);z-index:80;display:none;pointer-events:all;cursor:pointer}
.dn{font-weight:700;font-size:.78em;color:#d4a853;margin-bottom:3px}.dt{font-size:.82em;line-height:1.6;color:#d0c8bc;min-height:36px}.da{position:absolute;bottom:4px;right:10px;color:#6688cc;animation:pl 1.2s infinite;font-size:.65em}
#bui{position:fixed;bottom:0;left:0;width:100%;z-index:80;display:none;pointer-events:all}
#bui .ff{border-radius:0;display:flex;gap:8px;flex-wrap:wrap;padding:8px 12px}
.bc{padding:5px 12px;background:rgba(100,140,200,.08);border:1px solid rgba(100,140,200,.25);border-radius:2px;color:#c0d0ee;font-size:.7em;cursor:pointer;min-width:60px;text-align:center;pointer-events:all}.bc:hover{background:rgba(100,140,200,.2);color:#fff}.bc.dis{opacity:.35;pointer-events:none}.bi{margin-left:auto;text-align:right;font-size:.75em}
#hud{position:fixed;top:6px;left:6px;right:6px;z-index:50;display:none;pointer-events:none}
.hr{display:flex;justify-content:space-between}.hb{height:12px;border-radius:1px;overflow:hidden;border:1px solid rgba(100,140,200,.4);background:rgba(0,0,0,.7)}.hf{height:100%;transition:width .3s}.hph{background:linear-gradient(180deg,#44dd66,#22884a)}.hpm{background:linear-gradient(180deg,#5588ee,#2244aa)}.hpx{background:linear-gradient(180deg,#ddaa44,#886622)}.hl{position:absolute;top:0;left:3px;font-size:8px;line-height:12px;color:#fff;text-shadow:1px 1px 1px #000;font-weight:700}.hri{text-align:right;text-shadow:1px 1px 2px #000}.hri div{font-size:9px;margin-bottom:1px}
#mn{position:fixed;top:0;left:0;width:100%;height:100%;z-index:70;display:none;pointer-events:all}
.mb{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75)}.mx{position:relative;max-width:640px;margin:16px auto;height:calc(100% - 32px);display:flex}.ms{width:120px}.ms .ff{border-radius:4px 0 0 4px;border-right:none;height:100%}.mt{padding:7px 10px;font-size:.72em;color:#7788aa;cursor:pointer;border-left:2px solid transparent}.mt:hover,.mt.a{color:#d4a853;border-left-color:#d4a853;background:rgba(212,168,83,.06)}.mc{flex:1}.mc .ff{border-radius:0 4px 4px 0;height:100%;overflow-y:auto}
.mti{font-size:1em;color:#d4a853;border-bottom:1px solid rgba(100,140,200,.2);padding-bottom:6px;margin-bottom:10px}.mr{display:flex;justify-content:space-between;padding:2px 0;font-size:.78em;border-bottom:1px solid rgba(255,255,255,.03)}.ml{color:#7788aa}.mv{color:#ccc;font-weight:700}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}.es{background:rgba(255,255,255,.02);border:1px solid rgba(100,140,200,.15);border-radius:3px;padding:6px;cursor:pointer}.es:hover{border-color:#d4a853}.el2{font-size:.6em;color:#667;text-transform:uppercase}.en2{font-size:.78em;color:#ccc;margin-top:2px}.est{font-size:.65em;color:#d4a853;margin-top:1px}
.rc{border-left:3px solid #889}.ru{border-left:3px solid #4c6}.rr{border-left:3px solid #48f}.re{border-left:3px solid #a4f}.rl{border-left:3px solid #f80}.rd{border-left:3px solid #fe6}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:4px;margin-top:8px}.ii{background:rgba(255,255,255,.02);border:1px solid rgba(100,140,200,.1);border-radius:2px;padding:4px;cursor:pointer;font-size:.74em}.ii:hover{border-color:#d4a853}
.tch{position:fixed;bottom:0;left:0;width:100%;height:150px;pointer-events:none;z-index:60;display:none}
.dp2{position:absolute;bottom:12px;left:12px;width:110px;height:110px;pointer-events:all}.d2{position:absolute;width:34px;height:34px;background:rgba(100,140,200,.12);border:1px solid rgba(100,140,200,.25);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(150,180,220,.5)}.du{top:0;left:38px}.dd{bottom:0;left:38px}.dl{top:38px;left:0}.dr{top:38px;right:0}
.tbs{position:absolute;bottom:12px;right:12px;pointer-events:all;display:flex;gap:5px}.tb{width:44px;height:44px;border-radius:50%;border:1px solid rgba(100,140,200,.25);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(150,180,220,.5)}.ta{background:rgba(200,60,80,.18)}.tb2{background:rgba(60,100,200,.18)}.tm2{background:rgba(200,160,60,.15)}
.ntf{position:fixed;top:36%;left:50%;transform:translate(-50%,0);font-size:1.1em;font-weight:900;color:#d4a853;text-shadow:0 0 20px rgba(212,168,83,.5),0 2px 3px #000;z-index:95;pointer-events:none;opacity:0;transition:opacity .4s,transform .4s;text-align:center;line-height:1.6;background:rgba(0,0,0,.6);padding:8px 16px;border-radius:6px;border:1px solid rgba(212,168,83,.3)}.ntf.sh{opacity:1;transform:translate(-50%,-8px)}
#lu{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:96;display:none;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;pointer-events:all}
.lut{font-size:2.2em;font-weight:900;color:#d4a853;animation:tf 1.5s ease-in-out infinite}.lus{color:#bbb;margin-top:10px;font-size:.82em;text-align:center;line-height:1.8}
</style>
</head>
<body>
<div id="ts"><div class="tm">SAMURAI USAGI</div><div class="tj">侍うさぎ伝説</div><div class="ts2">LEGEND OF THE BLADE</div><div class="tst" id="sb">— TAP OR PRESS ENTER —</div></div>
<canvas id="c"></canvas>
<div id="hud"><div class="hr"><div style="width:clamp(110px,20vw,180px)"><div class="hb" style="height:14px;position:relative"><div class="hf hph" id="hhp"></div><div class="hl" id="hht"></div></div><div class="hb" style="height:8px;margin-top:2px"><div class="hf hpm" id="hmp"></div></div><div class="hb" style="height:4px;margin-top:1px"><div class="hf hpx" id="hxp"></div></div></div><div class="hri"><div style="color:#d4a853;font-weight:700" id="hlv"></div><div style="color:rgba(255,255,255,.4)" id="har"></div><div style="color:#d4a853" id="hgl"></div></div></div></div>
<div id="dlg"><div class="ff"><div class="dn" id="ddn"></div><div class="dt" id="ddt"></div><div class="da">▼</div></div></div>
<div id="bui"><div class="ff" id="bcm"></div></div>
<div id="mn"><div class="mb"></div><div class="mx"><div class="ms"><div class="ff"><div class="mt a" data-t="stats">STATUS</div><div class="mt" data-t="equip">EQUIP</div><div class="mt" data-t="inv">ITEMS</div><div class="mt" data-t="skills">SKILLS</div><div class="mt" data-t="story">STORY</div><div class="mt" data-t="close" style="margin-top:auto;color:#c66">CLOSE</div></div></div><div class="mc"><div class="ff" id="mct"></div></div></div></div>
<div class="ntf" id="ntf"></div>
<div id="lu"><div class="lut">LEVEL UP!</div><div class="lus" id="lus"></div><div style="color:#8899bb;margin-top:14px;animation:pl 1.5s infinite;font-size:.7em">tap to continue</div></div>
<div class="tch" id="tch"><div class="dp2"><div class="d2 du" data-dir="up">▲</div><div class="d2 dd" data-dir="down">▼</div><div class="d2 dl" data-dir="left">◀</div><div class="d2 dr" data-dir="right">▶</div></div><div class="tbs"><div class="tb tm2" id="tbm">MENU</div><div class="tb tb2" id="tbb">RUN</div><div class="tb ta" id="tba">ACT</div></div></div>
<script>
"use strict";
// ═══ PIXEL-PERFECT SCALING WITH LETTERBOX ═══
var NW=480,NH=270; // 16:9 native
var cv=document.getElementById('c');
cv.width=NW;cv.height=NH;
var X=cv.getContext('2d');
X.imageSmoothingEnabled=false;

function fitCanvas(){
  var sx=innerWidth/NW,sy=innerHeight/NH,s=Math.min(sx,sy);
  var cw=Math.floor(NW*s),ch=Math.floor(NH*s);
  cv.style.width=cw+'px';cv.style.height=ch+'px';
}
fitCanvas();addEventListener('resize',fitCanvas);

var isTch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
if(isTch)document.getElementById('tch').style.display='block';

// ─── INPUT ───
var K={},tD={up:0,down:0,left:0,right:0},tA=0,tR=0,tM=0;
onkeydown=function(e){K[e.key.toLowerCase()]=1;if(['arrowup','arrowdown','arrowleft','arrowright',' ','tab'].indexOf(e.key.toLowerCase())>=0)e.preventDefault();};
onkeyup=function(e){K[e.key.toLowerCase()]=0;};
document.querySelectorAll('.d2').forEach(function(b){var d=b.dataset.dir;b.ontouchstart=function(e){e.preventDefault();tD[d]=1;};b.ontouchend=function(){tD[d]=0;};b.ontouchcancel=function(){tD[d]=0;};});
document.getElementById('tba').ontouchstart=function(e){e.preventDefault();tA=1;};document.getElementById('tba').ontouchend=function(){tA=0;};
document.getElementById('tbb').ontouchstart=function(e){e.preventDefault();tR=1;};document.getElementById('tbb').ontouchend=function(){tR=0;};
document.getElementById('tbm').ontouchstart=function(e){e.preventDefault();tM=1;setTimeout(function(){tM=0;},100);};
var In={u:function(){return K.w||K.arrowup||tD.up;},d:function(){return K.s||K.arrowdown||tD.down;},l:function(){return K.a||K.arrowleft||tD.left;},r:function(){return K.d||K.arrowright||tD.right;},act:function(){return K[' ']||K.enter||tA;},mn:function(){return K.escape||K.tab||tM;},run:function(){return K.shift||tR;}};

var T=16,fr=0,gs='title',cam={x:0,y:0},shk=0,encCD=0;

// ═══ OFFSCREEN CANVAS HELPERS ═══
function mkC(w,h){var c=document.createElement('canvas');c.width=w;c.height=h;return c;}
// Draw filled rect on ctx
function R(g,x,y,w,h,c){g.fillStyle=c;g.fillRect(x,y,w,h);}
// Color helper
function rgb(r,g,b){return'rgb('+r+','+g+','+b+')';}
function rgba(r,g,b,a){return'rgba('+r+','+g+','+b+','+a+')';}

// ═══ FF PIXEL REMASTER STYLE TILES ═══
var TC={};
function buildTiles(){
  // ── GRASS TILES (8 variants - lush, rich, FF-style) ──
  for(var v=0;v<8;v++){
    var c=mkC(T,T),g=c.getContext('2d');
    // Base: rich deep green with subtle variation
    var bR=32,bG=72,bB=28;// deep saturated green base
    for(var y=0;y<T;y++)for(var x=0;x<T;x++){
      var h=((x*73+y*137+v*31)%23)/23;// hash for variation
      var r=bR+h*10|0,gr=bG+h*14|0,b=bB+h*8|0;
      // Checker dither for depth
      if((x+y)%2===0){r-=3;gr-=4;b-=2;}
      R(g,x,y,1,1,rgb(r,gr,b));
    }
    // ── Grass blade clusters (FF style - bright tips on dark base) ──
    // Each variant has different blade patterns
    var seeds=[[2,3],[6,1],[11,2],[14,5],[4,9],[8,7],[13,10],[1,13],[7,12],[10,6],[3,14],[15,8],[9,14],[5,5],[12,13],[0,7]];
    for(var s=0;s<seeds.length;s++){
      if((s+v*3)%4!==0)continue;// skip some per variant
      var sx=seeds[s][0],sy=seeds[s][1];
      var bright=(s+v)%3;
      // 2-3px tall blade with bright tip
      if(bright===0){
        R(g,sx,sy,1,1,rgb(55,105,40));R(g,sx,sy-1,1,1,rgb(65,120,45));R(g,sx,sy-2,1,1,rgb(80,140,55));// bright blade
      }else if(bright===1){
        R(g,sx,sy,1,1,rgb(45,85,32));R(g,sx,sy-1,1,1,rgb(55,100,38));// shorter
      }else{
        R(g,sx,sy,1,1,rgb(42,80,30));R(g,sx,sy-1,1,1,rgb(60,110,42));R(g,sx,sy-2,1,1,rgb(75,135,52));// tall
      }
    }
    // ── Highlight patches (sunlit spots, FF style warm light) ──
    if(v<4){
      var hx=(v*7+3)%12,hy=(v*5+2)%10+2;
      R(g,hx,hy,3,2,rgb(52,95,38));// bright patch
      R(g,hx+1,hy,2,1,rgb(58,105,42));// extra bright center
    }
    // ── Shadow patches (under trees implied) ──
    if(v>=4&&v<6){
      var shx=(v*4)%10+2,shy=(v*3)%8+4;
      R(g,shx,shy,4,3,rgb(24,55,20));R(g,shx+1,shy+1,2,1,rgb(20,48,16));
    }
    // ── Small flowers (FF style - tiny color pops) ──
    if(v===2){R(g,5,8,1,1,rgb(255,220,80));R(g,12,4,1,1,rgb(255,220,80));R(g,4,7,1,1,rgb(48,88,34));}// yellow
    if(v===5){R(g,3,6,1,1,rgb(255,130,140));R(g,4,6,1,1,rgb(255,160,165));R(g,3,5,1,1,rgb(50,90,35));}// pink
    if(v===7){R(g,10,11,1,1,rgb(180,140,255));R(g,11,11,1,1,rgb(200,170,255));R(g,10,10,1,1,rgb(48,88,34));}// purple
    // ── Occasional dirt peek-through ──
    if(v===6){R(g,8,9,2,1,rgb(95,78,48));R(g,9,10,1,1,rgb(88,72,42));}
    if(v===3){R(g,13,12,1,1,rgb(100,82,50));}
    TC['g'+v]=c;
  }

  // ── DIRT PATH (warm, worn, FF style with pebbles) ──
  for(var v2=0;v2<4;v2++){
    var c2=mkC(T,T),g3=c2.getContext('2d');
    // Warm sandy-brown base
    for(var y2=0;y2<T;y2++)for(var x2=0;x2<T;x2++){
      var h2=((x2*43+y2*97+v2*19)%17)/17;
      var dr=118+h2*18|0,dg=95+h2*14|0,db=62+h2*10|0;
      if((x2+y2+v2)%3===0){dr-=4;dg-=3;db-=2;}
      R(g3,x2,y2,1,1,rgb(dr,dg,db));
    }
    // Worn highlights (lighter center tracks)
    R(g3,4,0,8,T,rgb(128,105,72));R(g3,5,0,6,T,rgb(132,108,75));
    R(g3,6,0,4,T,'rgba(148,122,85,0.4)');
    // Pebbles / stones
    if(v2===0){R(g3,3,5,2,1,rgb(140,135,125));R(g3,11,10,2,2,rgb(135,130,118));R(g3,12,10,1,1,rgb(145,140,130));}
    if(v2===1){R(g3,7,3,1,1,rgb(105,88,58));R(g3,13,8,2,1,rgb(142,136,126));}
    if(v2===2){R(g3,2,12,2,1,rgb(138,132,120));R(g3,9,7,1,1,rgb(108,90,62));}
    // Grass edges creeping in
    if(v2===0||v2===2){R(g3,0,3,2,1,rgb(42,78,32));R(g3,1,4,1,1,rgb(38,72,28));R(g3,14,8,2,1,rgb(42,78,32));R(g3,15,7,1,1,rgb(38,72,28));}
    if(v2===1){R(g3,0,10,1,2,rgb(40,75,30));R(g3,15,2,1,2,rgb(40,75,30));}
    TC['d'+v2]=c2;
  }

  // ── STONE WALL / CLIFF (FF style layered rock with moss) ──
  for(var v3=0;v3<2;v3++){
    var c3=mkC(T,T),g4=c3.getContext('2d');
    // Dark stone base
    g4.fillStyle=rgb(58,62,54);g4.fillRect(0,0,T,T);
    // Brick rows with mortar
    R(g4,0,0,7,7,rgb(72,76,66));R(g4,8,0,8,7,rgb(66,70,60));
    R(g4,0,8,4,8,rgb(64,68,58));R(g4,5,8,6,8,rgb(70,74,64));R(g4,12,8,4,8,rgb(62,66,56));
    // Mortar lines
    for(var m=0;m<T;m++){R(g4,m,7,1,1,rgb(82,86,76));if(m<8)R(g4,7,m,1,1,rgb(82,86,76));if(m>=8){R(g4,4,m,1,1,rgb(82,86,76));R(g4,11,m,1,1,rgb(82,86,76));}}
    // Top highlight (sunlit)
    R(g4,0,0,T,1,rgba(255,255,255,0.1));R(g4,0,8,T,1,rgba(255,255,255,0.05));
    // Bottom shadow
    R(g4,0,6,T,1,rgba(0,0,0,0.08));R(g4,0,T-1,T,1,rgba(0,0,0,0.15));
    // Moss (green tint - FF style detail)
    if(v3===0){R(g4,2,5,2,1,rgb(48,68,38));R(g4,13,12,2,1,rgb(45,65,35));}
    if(v3===1){R(g4,9,3,1,1,rgb(50,70,40));R(g4,6,14,3,1,rgb(42,62,32));}
    TC['sw'+v3]=c3;
  }

  // ── WATER (deep blue, gentle waves, FF style reflections) ──
  var cw=mkC(T,T),gw=cw.getContext('2d');
  for(var yw=0;yw<T;yw++)for(var xw=0;xw<T;xw++){
    var nw=((xw*37+yw*83)%11)/11;
    // Deep blue base
    R(gw,xw,yw,1,1,rgb(15+nw*8|0,38+nw*12|0,88+nw*18|0));
  }
  // Wavelet highlights (bright horizontal streaks)
  R(gw,1,3,4,1,rgba(60,120,185,0.4));R(gw,2,4,2,1,rgba(70,130,195,0.25));
  R(gw,8,9,5,1,rgba(60,120,185,0.35));R(gw,9,10,3,1,rgba(70,130,195,0.2));
  R(gw,4,14,3,1,rgba(60,120,185,0.3));
  // Bright sparkle spots
  R(gw,3,3,1,1,rgba(130,180,230,0.5));R(gw,10,9,1,1,rgba(130,180,230,0.45));
  // Dark deep areas
  R(gw,7,6,2,2,rgba(0,0,30,0.2));R(gw,13,13,2,2,rgba(0,0,30,0.15));
  TC.wt=cw;

  // ── GRASS-TO-WATER EDGE (transition tile) ──
  var cge=mkC(T,T),gge=cge.getContext('2d');
  for(var yge=0;yge<T;yge++)for(var xge=0;xge<T;xge++){
    if(yge<6){var hge=((xge*73+yge*137)%17)/17;R(gge,xge,yge,1,1,rgb(32+hge*10|0,72+hge*14|0,28+hge*8|0));}
    else if(yge<8){R(gge,xge,yge,1,1,rgb(60,90,55));}// muddy edge
    else{var nge=((xge*37+yge*83)%11)/11;R(gge,xge,yge,1,1,rgb(15+nge*8|0,38+nge*12|0,88+nge*18|0));}
  }
  R(gge,3,6,2,1,rgb(95,78,48));R(gge,10,7,3,1,rgb(85,72,42));// bank dirt
  TC.gwe=cge;

  // ── CITY TILES (polished stone pavement, neon-lit) ──
  for(var vc=0;vc<2;vc++){
    var cc=mkC(T,T),gc=cc.getContext('2d');
    gc.fillStyle=rgb(35,38,52);gc.fillRect(0,0,T,T);
    // Stone pavers with slight color variation
    R(gc,1,1,6,6,rgb(40,43,58));R(gc,9,1,6,6,rgb(38,41,55));
    R(gc,1,9,6,6,rgb(34,37,50));R(gc,9,9,6,6,rgb(42,45,60));
    // Seam lines

var BBG={};
function genBattleBG(areaId){
  if(BBG[areaId])return BBG[areaId];
  var c=mkC(NW,NH),g=c.getContext('2d');
  var gY=NH*0.58|0;// ground line

  if(areaId==='countryside'){
    // Sky gradient (pixel bands)
    for(var y=0;y<gY;y++){
      var t=y/gY;
      R(g,0,y,NW,1,rgb(40+t*30|0,60+t*50|0,120+t*40|0));
    }
    // Distant mountains
    for(var x=0;x<NW;x++){
      var mh=Math.sin(x*0.02)*18+Math.sin(x*0.05)*8+30;
      var my=gY-50-mh|0;
      for(var y2=my;y2<gY-40;y2++){
        var mt=(y2-my)/(gY-40-my);
        R(g,x,y2,1,1,rgb(50+mt*15|0,70+mt*20|0,45+mt*15|0));
      }
    }
    // Closer hills
    for(var x2=0;x2<NW;x2++){
      var hh=Math.sin(x2*0.03+1)*12+Math.sin(x2*0.08)*6+18;
      var hy=gY-20-hh|0;
      for(var y3=hy;y3<gY;y3++){
        var ht=(y3-hy)/(gY-hy);
        R(g,x2,y3,1,1,rgb(35+ht*20|0,65+ht*15|0,28+ht*12|0));
      }
    }
    // Ground with grass texture
    for(var y4=gY;y4<NH;y4++)for(var x3=0;x3<NW;x3++){
      var n=((x3*43+y4*97)%17)/17;
      var depth=(y4-gY)/(NH-gY);
      R(g,x3,y4,1,1,rgb(42+n*12+depth*20|0,78+n*15-depth*10|0,32+n*8+depth*10|0));
    }
    // Trees in distance
    for(var tx=30;tx<NW;tx+=60+(tx*7%30)){
      var ty=gY-18-(tx%20);
      R(g,tx,ty+10,3,8,rgb(80,58,32));
      for(var dy=-6;dy<=4;dy++)for(var dx=-5;dx<=5;dx++){
        if(dx*dx+dy*dy<30)R(g,tx+1+dx,ty+dy,1,1,rgb(30+(dx+5)*3,55+(dx+5)*4,22+(dx+5)*2));
      }
    }
    // Clouds
    R(g,60,15,30,6,rgba(255,255,255,0.15));R(g,65,13,20,4,rgba(255,255,255,0.12));
    R(g,200,25,40,5,rgba(255,255,255,0.1));R(g,210,23,25,4,rgba(255,255,255,0.08));
    R(g,380,18,35,6,rgba(255,255,255,0.12));
  }else if(areaId.indexOf('neon')>=0||areaId.indexOf('market')>=0){
    // Night city sky
    for(var y5=0;y5<gY;y5++){
      var t2=y5/gY;
      R(g,0,y5,NW,1,rgb(8+t2*12|0,6+t2*15|0,20+t2*25|0));
    }
    // City skyline
    for(var bx=0;bx<NW;bx+=12+(bx*3%10)){
      var bh=20+(bx*7+13)%35;
      var by2=gY-bh;
      R(g,bx,by2,10,bh,rgb(20,22,35));R(g,bx,by2,10,1,rgb(30,32,45));
      // Windows (lit)
      for(var wy=by2+3;wy<gY-3;wy+=4)for(var wx=bx+2;wx<bx+8;wx+=3){
        if((wx*wy+bx)%5<2)R(g,wx,wy,2,2,rgba(255,200,80,0.5));
        else if((wx*wy+bx)%7<1)R(g,wx,wy,2,2,rgba(100,180,255,0.4));
      }
    }
    // Neon signs
    R(g,80,gY-45,12,3,rgba(255,50,100,0.4));R(g,200,gY-52,15,3,rgba(50,200,255,0.3));R(g,350,gY-40,10,3,rgba(180,80,255,0.35));
    // Ground
    for(var y6=gY;y6<NH;y6++)for(var x4=0;x4<NW;x4++){
      var n2=((x4*29+y6*67)%13)/13;
      var dp=(y6-gY)/(NH-gY);
      R(g,x4,y6,1,1,rgb(32+n2*10+dp*15|0,35+n2*8+dp*12|0,50+n2*12+dp*8|0));

    R(g,120,gY+20,40,2,rgba(100,180,255,0.08));R(g,300,gY+30,30,2,rgba(255,100,150,0.06));

    for(var si=0;si<20;si++){R(g,(si*37+13)%NW,(si*23+7)%(gY-20),1,1,rgba(255,255,255,0.3));}
  }else if(areaId==='slums'){
    for(var y7=0;y7<gY;y7++){var t3=y7/gY;R(g,0,y7,NW,1,rgb(10+t3*8|0,10+t3*10|0,14+t3*12|0));}
    // Ruined buildings
    for(var rx=0;rx<NW;rx+=15+(rx*3%12)){
      var rh=15+(rx*11+7)%30;var ry=gY-rh;
      R(g,rx,ry,12,rh,rgb(28,28,32));R(g,rx,ry,12,1,rgb(35,35,40));
      // Broken windows
      for(var rwy=ry+4;rwy<gY-4;rwy+=5)for(var rwx=rx+2;rwx<rx+10;rwx+=4){
        if((rwx+rwy)%7<3)R(g,rwx,rwy,2,2,rgb(22,22,26));
      }
      // Damage
      if(rx%30<12){R(g,rx+8,ry+3,4,rh/2|0,rgb(10,10,12));}
    }
    for(var y8=gY;y8<NH;y8++)for(var x5=0;x5<NW;x5++){
      var n3=((x5*41+y8*89)%11)/11;R(g,x5,y8,1,1,rgb(24+n3*8|0,24+n3*8|0,28+n3*8|0));
    }
  }else if(areaId==='underworld'){
    // Hellish sky
    for(var y9=0;y9<gY;y9++){var t4=y9/gY;
      R(g,0,y9,NW,1,rgb(12+t4*30|0,2+t4*5|0,4+t4*8|0));}
    // Stalactites
    for(var stx=0;stx<NW;stx+=8+(stx*3%12)){
      var sth=5+(stx*7+3)%20;
      for(var sty=0;sty<sth;sty++){
        var stw=Math.max(1,4-sty/4|0);
        R(g,stx,sty,stw,1,rgb(45+sty,18+sty/2|0,25+sty/2|0));
      }
    }
    // Lava pools in distance
    R(g,40,gY-8,60,6,rgb(180,50,10));R(g,45,gY-7,50,3,rgb(220,80,20));R(g,50,gY-6,40,2,rgb(255,140,40));
    R(g,250,gY-6,45,5,rgb(170,45,8));R(g,255,gY-5,35,3,rgb(210,70,15));
    // Ground (dark rock)
    for(var y10=gY;y10<NH;y10++)for(var x6=0;x6<NW;x6++){
      var n4=((x6*53+y10*97)%17)/17;R(g,x6,y10,1,1,rgb(18+n4*10|0,8+n4*5|0,12+n4*7|0));
    }
    // Lava cracks in ground
    for(var lx=20;lx<NW;lx+=40+(lx%25)){
      var ly=gY+5+(lx%15);
      R(g,lx,ly,8,1,rgb(180,50,10));R(g,lx+1,ly+1,6,1,rgb(140,35,5));
    }
    // Fire particles in sky (static)
    for(var fi=0;fi<12;fi++){
      R(g,(fi*41+17)%NW,(fi*29+5)%(gY-10),2,2,rgba(255,100+fi*10,0,0.2));
    }
  }else{
    // Generic
    for(var yg=0;yg<gY;yg++){R(g,0,yg,NW,1,rgb(15,15,25));}
    for(var yg2=gY;yg2<NH;yg2++)for(var xg=0;xg<NW;xg++){R(g,xg,yg2,1,1,rgb(40,40,50));}
  }
  BBG[areaId]=c;return c;
}

// ═══ FLOATING DAMAGE NUMBERS ═══
var dmgNums=[];
function addDmgNum(x,y,txt,color){
  dmgNums.push({x:x,y:y,txt:txt,color:color||'#fff',life:50,vy:-0.6});
}
function updDmgNums(){
  for(var i=dmgNums.length-1;i>=0;i--){
    dmgNums[i].y+=dmgNums[i].vy;dmgNums[i].life--;
    if(dmgNums[i].life<=0)dmgNums.splice(i,1);
  }
}
function drawDmgNums(){
  X.font='bold 8px sans-serif';X.textAlign='center';
  dmgNums.forEach(function(d){
    var a=Math.min(1,d.life/15);
    X.fillStyle='rgba(0,0,0,'+a*0.5+')';X.fillText(d.txt,d.x+1,d.y+1);
    X.fillStyle=d.color.replace(')',','+a+')').replace('rgb','rgba');
    if(d.color.charAt(0)==='#'){
      X.globalAlpha=a;X.fillStyle=d.color;X.fillText(d.txt,d.x,d.y);X.globalAlpha=1;
    }else{X.fillText(d.txt,d.x,d.y);}
  });
}

// ═══ DECORATION PLACEMENT ═══
var decorations=[];
function genDecorations(area){
  decorations=[];
  var aw=area.width,ah=area.height;
  var isW2=function(x,y){return mapW.some(function(w){return w.x===x&&w.y===y;});};
  var hash=function(x,y){return(x*73+y*137)%100;};
  if(area.id==='countryside'){
    for(var x=1;x<aw-1;x++)for(var y=1;y<ah-1;y++){
      if(isW2(x,y))continue;var h=hash(x,y);
      if(h<5&&!isW2(x,y-1)&&!isW2(x,y-2))decorations.push({tx:x,ty:y,type:'tree',v:h%3,yOff:-16});
      else if(h>=5&&h<9)decorations.push({tx:x,ty:y,type:'bush',yOff:3});
      else if(h>=9&&h<11)decorations.push({tx:x,ty:y,type:'rock',yOff:4});
      else if(h===11)decorations.push({tx:x,ty:y,type:'fence',yOff:2});
    }
  }else if(area.id.includes('neon')||area.id.includes('market')){
    for(var x2=1;x2<aw-1;x2++)for(var y2=1;y2<ah-1;y2++){
      if(isW2(x2,y2))continue;var h2=hash(x2,y2);
      if(h2<3)decorations.push({tx:x2,ty:y2,type:'lantern',yOff:-2});
      else if(h2>=3&&h2<5)decorations.push({tx:x2,ty:y2,type:'rock',yOff:4});
    }
  }else if(area.id==='slums'){

function genItem(lvl,forcedRarity,forcedType){
  var rr=forcedRarity;
  if(!rr){var roll=Math.random();rr=roll<.40?'common':roll<.70?'uncommon':roll<.88?'rare':roll<.96?'epic':roll<.99?'legendary':'divine';}
  var ri=RARITY_ORDER.indexOf(rr);
  var type=forcedType||['weapon','body','head','accessory'][~~(Math.random()*4)];
  var bases=ITEM_BASES[type];
  var bi=Math.min(bases.length-1,Math.max(0,~~(lvl/10)+~~(ri/2)+~~(Math.random()*2)));
  var base=bases[bi];
  var item={type:type,rarity:rr,generated:1};
  // Copy base stats
  if(base.atk)item.atk=base.atk;if(base.def)item.def=base.def;
  // Level scaling: +1-3% per level
  var scale=1+lvl*0.025+ri*0.15;
  if(item.atk)item.atk=~~(item.atk*scale);if(item.def)item.def=~~(item.def*scale);
  // Number of affixes based on rarity
  var numAffixes=[0,1,2,3,4,5][ri];
  var usedStats={};var affixDescs=[];
  for(var a=0;a<numAffixes;a++){
    var pool=AFFIX_POOL.filter(function(af){return!usedStats[af.s];});
    if(!pool.length)break;
    var tw=0;pool.forEach(function(p){tw+=p.w;});var r=Math.random()*tw,cum=0,pick=pool[0];
    for(var p=0;p<pool.length;p++){cum+=pool[p].w;if(r<cum){pick=pool[p];break;}}
    usedStats[pick.s]=1;
    var val=0;
    if(pick.s==='hp')val=~~((8+lvl*1.5+ri*10)*(0.7+Math.random()*0.6));
    else if(pick.s==='crit'||pick.s==='dodge'||pick.s==='holyDmg')val=~~((2+ri*4+lvl*0.3)*(0.7+Math.random()*0.6));
    else val=~~((1+lvl*0.3+ri*2)*(0.7+Math.random()*0.6));
    val=Math.max(1,val);
    if(item[pick.s])item[pick.s]+=val;else item[pick.s]=val;
    affixDescs.push(pick.n+'+'+val);
  }
  // Name generation
  var prefix='',suffix='';
  if(ri>=1&&ITEM_PREFIXES[type])prefix=ITEM_PREFIXES[type][~~(Math.random()*ITEM_PREFIXES[type].length)]+' ';
  if(ri>=3&&ITEM_SUFFIXES[type])suffix=' '+ITEM_SUFFIXES[type][~~(Math.random()*ITEM_SUFFIXES[type].length)];
  item.name=prefix+base.n+suffix;
  item.affixDescs=affixDescs;
  item.iLvl=lvl;
  // Unique ID for inventory
  item.uid='gen_'+Date.now()+'_'+~~(Math.random()*99999);
  return item;
}
// Generated inventory storage
function addGenItem(item){if(!P.genItems)P.genItems=[];P.genItems.push(item);}
function getGenItem(uid){return(P.genItems||[]).find(function(i){return i.uid===uid;});}
function removeGenItem(uid){P.genItems=(P.genItems||[]).filter(function(i){return i.uid!==uid;});}
// Battle drop generator
function rollBattleLoot(enemyLvl,enemyGold){
  var drops=[];
  var chance=0.35+enemyLvl*0.005;
  if(Math.random()<chance){drops.push(genItem(enemyLvl));}
  if(Math.random()<chance*0.3){drops.push(genItem(enemyLvl));} // rare double drop
  return drops;
}

// Tree helpers
function hasNode(tr,nd){return P.treeNodes&&P.treeNodes[tr+'.'+nd];}
function canUnlock(tr,nd){var n=TREE[tr].nodes[nd];if(!n||hasNode(tr,nd))return false;var pts=TREE[tr].wep?P.weapSP:P.charSP;if(pts<n.cost)return false;for(var i=0;i<n.req.length;i++){if(!hasNode(tr,n.req[i]))return false;}return true;}
function unlockNode(tr,nd){if(!canUnlock(tr,nd))return;var n=TREE[tr].nodes[nd];if(TREE[tr].wep)P.weapSP-=n.cost;else P.charSP-=n.cost;P.treeNodes[tr+'.'+nd]=1;if(n.fx.skill&&P.knownSkills.indexOf(n.fx.skill)<0)P.knownSkills.push(n.fx.skill);showN('Unlocked: '+n.name+'!');renderMn('skills');}
function treeStat(stat){var t=0;if(!P.treeNodes)return 0;Object.keys(P.treeNodes).forEach(function(k){var p=k.indexOf('.'),tId=k.substring(0,p),nId=k.substring(p+1);var tr=TREE[tId];if(!tr)return;var n=tr.nodes[nId];if(n&&n.fx&&n.fx[stat])t+=n.fx[stat];});return t;}

function getEq(s){
  // Check for generated equipped items first
  if(P.genEquipped&&P.genEquipped[s]){var gi=getGenItem(P.genEquipped[s]);if(gi)return gi;}
  var id=P.equipment[s];if(!id)return null;return(s==='weapon'?WEAPONS:s==='body'?ARMOR:s==='head'?HEADGEAR:ACCESSORIES)[id]||null;
}
function tS(s){var b=s==='atk'?P.baseAtk:s==='def'?P.baseDef:s==='spd'?P.baseSpd:P.baseSpr;['weapon','body','head','accessory'].forEach(function(sl){var e=getEq(sl);if(e&&e[s])b+=e[s];});b+=treeStat(s);return b;}
function tHp(){var b=0;['weapon','body','head','accessory'].forEach(function(s){var e=getEq(s);if(e&&e.hp)b+=e.hp;});return P.maxHp+b+treeStat('maxHp');}
function tMp(){return P.maxMp+treeStat('maxMp');}
function tCr(){var c2=2;['weapon','body','head','accessory'].forEach(function(s){var e=getEq(s);if(e&&e.crit)c2+=e.crit;});c2+=treeStat('crit');return c2;}

function gainXP(a){P.xp+=a;while(P.xp>=P.xpNext&&P.level<99){P.xp-=P.xpNext;P.level++;P.xpNext=~~(P.xpNext*1.35+P.level*2);var h=5+~~(Math.random()*4)+~~(P.level/10),m=2+~~(Math.random()*2)+~~(P.level/15),a2=1+(P.level%3===0?1:0)+(P.level%10===0?2:0),dd=1+(P.level%4===0?1:0)+(P.level%10===0?2:0);P.maxHp+=h;P.hp=Math.min(P.hp+h,tHp());P.maxMp+=m;P.mp=Math.min(P.mp+tMp(),tMp());P.baseAtk+=a2;P.baseDef+=dd;if(P.level%2===0)P.baseSpd++;if(P.level%3===0)P.baseSpr++;
  // SP gains: 1 each per level, bonus at milestones
  var cSP=1,wSP=1;if(P.level%5===0){cSP+=1;wSP+=1;}if(P.level%10===0){cSP+=2;wSP+=2;}if(P.level%25===0){cSP+=3;wSP+=3;}
  P.charSP+=cSP;P.weapSP+=wSP;
  Object.entries(SKILL_DB).forEach(function(e){if(e[1].unlockLvl===P.level&&P.knownSkills.indexOf(e[0])<0){P.knownSkills.push(e[0]);showN('Learned: '+e[1].name+'!');}});
  var spMsg=cSP>1?' +'+cSP+' Char SP, +'+wSP+' Weap SP':' +1 Char SP, +1 Weap SP';
  document.getElementById('lus').innerHTML='Level '+P.level+(P.level%10===0?' ★ MILESTONE! ★':'')+'<br>HP+'+h+' MP+'+m+' ATK+'+a2+' DEF+'+dd+'<br>'+spMsg;document.getElementById('lu').style.display='flex';gs='levelup';document.getElementById('lu').onclick=function(){document.getElementById('lu').style.display='none';gs='explore';};}}

function bMenuAct(){
  if(bMenu.sub===null){
    var cmd=bMenu.items[bMenu.sel];
    if(cmd==='FIGHT'){bAtk('slash');}
    else if(cmd==='PRAYER'){
      var skills=P.knownSkills.filter(function(id){return id!=='slash';});
      if(!skills.length){B.txt='No prayers!';return;}
      bMenu.sub='prayer';bMenu.subSel=0;bMenu.subItems=skills;
    }else if(cmd==='ITEM'){
      var items=[];
      if(P.potions.hp>0)items.push({id:'hp',name:'HP Potion x'+P.potions.hp});
      if(P.potions.mp>0)items.push({id:'mp',name:'MP Potion x'+P.potions.mp});
      if(!items.length){B.txt='No items!';return;}
      bMenu.sub='item';bMenu.subSel=0;bMenu.subItems=items;
    }else if(cmd==='DEFEND'){
      B.pDef=1;B.txt='Defending!';B.phase='animate';B.animT=35;
    }else if(cmd==='RUN'){
      if(B.enemies.some(function(e){return e.boss;})){B.txt="Can't flee!";B.phase='animate';B.animT=35;return;}
      if(Math.random()<.5+tS('spd')*.02){endB(0);}else{B.txt="Can't escape!";B.phase='animate';B.animT=35;}
    }

    var skId=bMenu.subItems[bMenu.subSel];var sk=SKILL_DB[skId];

    bMenu.sub=null;bAtk(skId);
  }else if(bMenu.sub==='item'){
    var it=bMenu.subItems[bMenu.subSel];

    else if(it.id==='mp'){P.potions.mp--;var r2=~~(tMp()*.5);P.mp=Math.min(P.mp+r2,tMp());B.txt='+'+r2+' MP';addDmgNum(NW*0.15,NH*0.4,'+'+r2,rgb(80,150,255));B.phase='animate';B.animT=50;}
  }
}
function bAtk(skId){var sk=SKILL_DB[skId];P.mp-=(sk.mpCost||0);var tgt=B.enemies.find(function(e){return e.alive;});if(!tgt)return;
  var al=B.enemies.filter(function(e){return e.alive;});var sp=Math.min(80,(NW*0.5)/(al.length+1));var stX=NW*0.52;
  var ti=al.indexOf(tgt);var ex=stX+ti*sp|0,ey=NH*0.35|0;
  B.atkAnim={active:1,timer:0,type:sk.type==='holy'?'holy':sk.type==='heal'||sk.type==='buff'?'heal':'slash',tx:ex,ty:ey};
  if(sk.type==='heal'){var hpw=sk.healPower;hpw*=1+treeStat('healBonus')/100;var h2=~~(tHp()*hpw);P.hp=Math.min(P.hp+h2,tHp());B.txt=sk.name+'! +'+h2+' HP';addDmgNum(NW*0.15,NH*0.35,'+'+h2,rgb(80,255,80));}
  else if(sk.type==='buff'){var sa=sk.buffAmount;sa+=~~(sa*treeStat('shieldBonus')/100);B.shield=sa;B.txt=sk.name+'! DEF+'+sa;addDmgNum(NW*0.15,NH*0.35,'DEF+'+sa,rgb(100,180,255));}
  else{var atk=tS('atk'),pw=sk.power*atk;
    if(sk.type==='holy'){pw+=tHo();pw*=1+treeStat('holyBonus')/100;}
    if(skId==='slash')pw*=1+treeStat('slashBonus')/100;
    pw*=1+treeStat('katanaBonus')/100*0;// katanaBonus applied below
    // Berserker
    if(treeStat('berserker')>0&&P.hp<tHp()*.3)pw*=1+treeStat('berserker')/100;
    var crit=Math.random()*100<tCr()+(sk.critBonus||0)+treeStat('katanaCrit');if(crit)pw*=1.8;
    if(sk.armorPierce){// Impale
      if(sk.aoe){B.enemies.forEach(function(e,i2){if(!e.alive)return;var dm2=Math.max(1,~~(pw-e.def*(1-sk.armorPierce/100)*.5));e.curHp-=dm2;e.flash=12;if(e.curHp<=0)e.alive=0;addDmgNum(stX+i2*sp|0,NH*0.3-i2*5,dm2+(crit?' CRIT!':''),crit?rgb(255,255,80):rgb(255,255,255));});}
      else{var dm=Math.max(1,~~(pw-tgt.def*(1-sk.armorPierce/100)*.5));tgt.curHp-=dm;tgt.flash=12;if(tgt.curHp<=0)tgt.alive=0;addDmgNum(ex,ey-10,dm+(crit?'!':''),crit?rgb(255,255,80):rgb(255,255,255));B.txt=dm+' damage!'+(crit?' CRITICAL!':'');}
    }else if(sk.aoe){B.enemies.forEach(function(e,i2){if(!e.alive)return;var dm2=Math.max(1,~~(pw-e.def*.5));e.curHp-=dm2;e.flash=12;if(e.curHp<=0)e.alive=0;addDmgNum(stX+i2*sp|0,NH*0.3-i2*5,dm2+(crit?' CRIT!':''),crit?rgb(255,255,80):rgb(255,255,255));});B.txt=sk.name+'!';}
    else{var dm=Math.max(1,~~(pw-tgt.def*.5));tgt.curHp-=dm;tgt.flash=12;if(tgt.curHp<=0)tgt.alive=0;
      // Lifesteal
      if(sk.lifesteal){var ls=~~(dm*sk.lifesteal/100);P.hp=Math.min(P.hp+ls,tHp());addDmgNum(NW*0.15,NH*0.35,'+'+ls,rgb(80,255,80));}
      addDmgNum(ex,ey-10,dm+(crit?'!':''),crit?rgb(255,255,80):rgb(255,255,255));B.txt=dm+' damage!'+(crit?' CRITICAL!':'');}
    shk=crit?8:4;}
  // MP regen from tree
  var mrg=treeStat('mpRegen');if(mrg>0){var mr=~~(tMp()*mrg/100);P.mp=Math.min(P.mp+mr,tMp());}
  // HP regen from tree
  var hrg=treeStat('hpRegen');if(hrg>0){var hr=~~(tHp()*hrg/100);P.hp=Math.min(P.hp+hr,tHp());}
  B.phase='animate';B.animT=55;}
function bET(){B.phase='enemy_turn';var al=B.enemies.filter(function(e){return e.alive;});if(!al.length){endB(1);return;}
  // Dodge check
  var dg=tDodge();if(dg>0&&Math.random()*100<dg){B.txt='Dodged!';addDmgNum(NW*0.15,NH*0.35,'DODGE',rgb(100,200,255));B.phase='animate';B.animT=40;return;}

  if(P.hp<=0){P.hp=0;B.txt+=' Defeated!';B.phase='animate';B.animT=90;setTimeout(function(){P.hp=~~(tHp()/2);P.mp=~~(tMp()/2);endB(0);showN('Defeated...');},2000);return;}

// ═══ TILE LOOKUP ═══
function getTile(aId,isW2,isWater,tx,ty){
  if(isWater)return TC.wt;
  if(aId==='countryside')return isW2?TC['sw'+((tx+ty)%2)]:TC['g'+((tx*73+ty*137)%8)];
  if(aId.indexOf('neon')>=0)return isW2?TC.cw:TC['cf'+((tx+ty)%2)];
  if(aId.indexOf('market')>=0)return isW2?TC.mw:TC.mf;
  if(aId==='slums')return isW2?TC.slw:TC.sf;
  if(aId==='underworld')return isW2?TC.uw:TC.uf;
  return isW2?TC.sw0:TC.g0;
}

function drawExplore(){
  var area=AREAS[curArea],aid=area.id;
  cam.x+=(P.x-NW/2-cam.x)*.15;cam.y+=(P.y-NH/2-cam.y)*.15;

    }else if(item.t==='n'){var n=item.d,nx=n.x*T+T/2-8-cam.x+sx|0,ny=n.y*T+T/2-12-cam.y+sy|0;
      X.drawImage(genNPC(n.sprite),nx,ny);

      if(dist<T*2){X.fillStyle=fr%30<15?'#d4a853':'#a08030';X.fillRect(n.x*T+T/2-1-cam.x+sx|0,n.y*T-5-cam.y+sy|0,2,3);}
    }else{var wf=P.moving?P.walkFrame:0,ar=getEq('body')?getEq('body').rarity:'common';
      X.drawImage(genUsagi(P.dir,wf,ar,!!P.storyFlags.is_holy_knight),P.x-12-cam.x+sx|0,P.y-16-cam.y+sy|0);}
  });

// ═══ DRAW BATTLE (Full JRPG Style) ═══
function drawBattle(){
  var area=AREAS[curArea],aId=area.id;
  var gY=NH*0.58|0;// ground line
  var uiY=NH*0.62|0;// UI area start
  var sx2=0,sy2=0;if(shk>0){sx2=(Math.random()-.5)*shk*2|0;sy2=(Math.random()-.5)*shk*2|0;shk--;}

  // ── 1. BACKGROUND ──
  X.save();X.translate(sx2,sy2);
  var bg=genBattleBG(aId);X.drawImage(bg,0,0);
  // Animated elements on top of cached BG
  if(aId==='underworld'){
    // Flickering lava glow
    if(fr%6<3){R(X,45,gY-7,50,3,rgba(255,140,40,0.15));}
    // Rising embers
    for(var ei=0;ei<5;ei++){
      var ey2=gY-10-((fr*2+ei*30)%60),ex2=(ei*80+fr+20)%NW;
      R(X,ex2,ey2,1,1,rgba(255,100+ei*20,0,0.5-ey2/200));
    }
  }else if(aId.indexOf('neon')>=0||aId.indexOf('market')>=0){
    // Flickering neon
    if(fr%20<3){R(X,80,gY-45,12,3,rgba(255,50,100,0.25));}
    if(fr%25<4){R(X,200,gY-52,15,3,rgba(50,200,255,0.2));}
  }else if(aId==='countryside'){
    // Swaying grass hint
    if(fr%12<6){for(var gi=0;gi<8;gi++)R(X,gi*60+20+(fr%3),gY-1,2,1,rgb(55,105,42));}
  }
  X.restore();

  // ── 2. ENEMIES (large, centered in upper area) ──
  var al=B.enemies.filter(function(e){return e.alive;});
  var espacing=Math.min(80,(NW*0.5)/(al.length+1));
  var estartX=NW*0.52-(al.length-1)*espacing/2|0;
  al.forEach(function(e,i){
    var ex3=(estartX+i*espacing+sx2)|0;
    var spr=genBEnemy(e.id);
    var eS=e.boss?2:1.5;// scale: bosses 2x, normal 1.5x
    var eW=spr.width*eS|0,eH=spr.height*eS|0;
    var ey3=gY-eH+2+sy2|0;
    // Hit flash (blink effect)
    if(e.flash>0&&e.flash%4<2){
      // Don't draw (blink off frame)
    }else{
      X.imageSmoothingEnabled=false;
      X.drawImage(spr,ex3-eW/2|0,ey3,eW,eH);
      X.imageSmoothingEnabled=true;
    }
    // White flash overlay on hit
    if(e.flash>8){
      R(X,ex3-eW/2|0,ey3,eW,eH,rgba(255,255,255,0.4));
    }
    // Enemy name above
    X.font='bold 6px sans-serif';X.textAlign='center';X.fillStyle=rgba(255,255,255,0.8);
    X.fillText(e.name,ex3,ey3-6);
    // HP bar above enemy
    var bw2=32,bx2=ex3-bw2/2|0,by2=ey3-3;
    R(X,bx2-1,by2-1,bw2+2,4,rgba(0,0,0,0.6));
    R(X,bx2,by2,bw2,2,rgb(30,10,10));
    var hpRatio=Math.max(0,e.curHp/e.hp);
    var hpColor=hpRatio>.5?rgb(60,200,80):hpRatio>.25?rgb(220,180,40):rgb(220,50,40);
    R(X,bx2,by2,(bw2*hpRatio)|0,2,hpColor);
    R(X,bx2,by2,(bw2*hpRatio)|0,1,rgba(255,255,255,0.15));// bar highlight
  });

  // ── 3. PLAYER SPRITE (pose-driven with iaijutsu lunge) ──
  var ar2=getEq('body')?getEq('body').rarity:'common';
  var pose='idle',lungeX=0;
  if(B.atkAnim&&B.atkAnim.active){
    var at2=B.atkAnim.timer;
    if(B.atkAnim.type==='slash'||B.atkAnim.type==='holy'){
      if(at2<5){pose='draw';lungeX=at2*3;}
      else if(at2<12){pose='slash';lungeX=15+(at2-5)*4;}
      else if(at2<18){pose='slash';lungeX=43-(at2-12)*3;}
      else{pose='return';lungeX=Math.max(0,25-(at2-18)*4);}
    }
  }
  var pSpr=genBattleUsagi(B.phase==='choose'?(fr/8|0)%8:fr%4|0,ar2,!!P.storyFlags.is_holy_knight,pose);
  var baseX=NW*0.06;
  var pW=pSpr.width*2,pH=pSpr.height*2;
  var px3=baseX+lungeX+sx2|0,py3=gY-pH+8+sy2|0;
  X.imageSmoothingEnabled=false;
  X.drawImage(pSpr,px3,py3,pW,pH);
  X.imageSmoothingEnabled=true;

  // ── 4. ATTACK EFFECTS (slash trail, holy beam, heal sparkles) ──
  if(B.atkAnim&&B.atkAnim.active){
    var at=B.atkAnim.timer,atype=B.atkAnim.type,atx=B.atkAnim.tx,aty=B.atkAnim.ty;
    if(atype==='slash'){
      if(at>=5&&at<16){
        var slP=(at-5)/10,slA=at<12?0.7:Math.max(0,0.7-(at-12)*0.15);
        X.save();var trX=px3+pW-8,trY=py3+24;
        X.translate(trX,trY);X.rotate(-0.8+slP*2.5);
        R(X,-1,-25,2,35,rgba(255,255,255,slA));
        R(X,0,-22,1,30,rgba(200,230,255,slA*0.7));
        R(X,-3,-20,1,28,rgba(255,255,255,slA*0.3));
        R(X,2,-20,1,28,rgba(255,255,255,slA*0.3));
        X.restore();
        if(at>=6&&at<10){var lineA=0.4-(at-6)*0.08;for(var sl=0;sl<3;sl++){R(X,px3+pW,gY-20-sl*8+sy2,atx-px3-pW,1,rgba(255,255,255,lineA));}}
        if(at>=7&&at<11){var impA=0.5-(at-7)*0.1;R(X,atx-10,gY-40,20,20,rgba(255,255,255,impA));
          for(var sp2=0;sp2<4;sp2++){R(X,atx-6+(at-7)*3*Math.cos(sp2*1.6)|0,gY-30+(at-7)*2*Math.sin(sp2*1.6)|0,2,2,rgba(255,240,200,impA));}}
      }
    }else if(atype==='holy'){
      var holyA=Math.max(0,0.6-at/40);
      if(at>=5){R(X,atx-8,0,16,gY,rgba(255,240,140,holyA*0.4));R(X,atx-4,0,8,gY,rgba(255,250,200,holyA*0.6));R(X,atx-1,0,2,gY,rgba(255,255,255,holyA*0.8));}
      if(at>=8&&at<18){var ca=1-(at-8)/10;R(X,atx-1,gY-50,2,16,rgba(255,255,200,ca));R(X,atx-8,gY-43,16,2,rgba(255,255,200,ca));}
      for(var hp2=0;hp2<6;hp2++){var hpy=gY-10-at*2-hp2*8,hpx2=atx-10+Math.sin(at*0.3+hp2)*12|0;if(hpy>0)R(X,hpx2,hpy,2,2,rgba(255,230,100,holyA));}
    }else if(atype==='heal'){
      for(var hs=0;hs<8;hs++){var hsx=px3+pW/2+Math.sin(at*0.4+hs*0.8)*20|0,hsy=py3+pH/2-at*1.2-hs*3,ha=Math.max(0,0.8-at/30);R(X,hsx,hsy,2,2,rgba(80,255,120,ha));R(X,hsx+1,hsy-1,1,1,rgba(200,255,220,ha));}
    }
  }

  // ── 5. FLOATING DAMAGE NUMBERS ──
  drawDmgNums();

  // ── 6. FF-STYLE UI WINDOWS ──
  var uiH=NH-uiY-2;

  // Command window (left)
  drawFFBox(3,uiY,80,uiH);
  X.textAlign='left';
  if(bMenu.sub===null){
    bMenu.items.forEach(function(item,i){
      var iy=uiY+5+i*10;
      X.font='bold 7px sans-serif';
      X.fillStyle='rgba(0,0,0,0.5)';X.fillText(item,15,iy+6);
      X.fillStyle=i===bMenu.sel?'#fff':rgb(140,150,180);
      X.fillText(item,14,iy+5);
      // Selection cursor
      if(i===bMenu.sel&&B.phase==='choose'){
        var cBlink=fr%20<14;
        if(cBlink){X.fillStyle='#fff';X.font='bold 7px sans-serif';X.fillText('\u25B6',5,iy+5);}
      }
    });
  }else{
    // Sub-menu (prayer/item list)
    X.font='bold 7px sans-serif';X.fillStyle='rgba(0,0,0,0.5)';X.fillText(bMenu.sub==='prayer'?'PRAYER':'ITEMS',9,uiY+10);
    X.fillStyle=rgb(220,195,105);X.fillText(bMenu.sub==='prayer'?'PRAYER':'ITEMS',8,uiY+9);
    bMenu.subItems.forEach(function(item,i){
      var iy=uiY+14+i*9;
      var name=bMenu.sub==='prayer'?SKILL_DB[item].name+' '+SKILL_DB[item].mpCost:item.name;
      X.font='7px sans-serif';
      X.fillStyle='rgba(0,0,0,0.5)';X.fillText(name,15,iy+5);
      X.fillStyle=i===bMenu.subSel?'#fff':rgb(140,150,180);
      X.fillText(name,14,iy+4);
      if(i===bMenu.subSel&&B.phase==='choose'){
        var cB=fr%20<14;if(cB){X.fillStyle='#fff';X.font='bold 7px sans-serif';X.fillText('\u25B6',5,iy+4);}
      }
    });
  }

  // Status window (right)
  drawFFBox(86,uiY,NW-89,uiH);
  var sx3=92;
  // Player name and level
  X.fillStyle='rgba(0,0,0,0.5)';X.font='bold 7px sans-serif';X.textAlign='left';
  X.fillText('USAGI',sx3+1,uiY+10);
  X.fillStyle='#fff';X.fillText('USAGI',sx3,uiY+9);
  X.fillStyle='rgba(0,0,0,0.5)';X.font='7px sans-serif';
  X.fillText('Lv'+P.level,sx3+41,uiY+10);
  X.fillStyle=rgb(140,150,180);X.fillText('Lv'+P.level,sx3+40,uiY+9);
  // HP bar
  X.fillStyle=rgb(140,150,180);X.font='bold 6px sans-serif';X.fillText('HP',sx3,uiY+19);
  var hpW=80,hpX=sx3+14;
  R(X,hpX,uiY+15,hpW,5,rgb(20,10,10));
  var hpP=P.hp/tHp();
  R(X,hpX,uiY+15,(hpW*hpP)|0,5,hpP>.5?rgb(40,180,60):hpP>.25?rgb(200,160,30):rgb(200,40,30));
  R(X,hpX,uiY+15,(hpW*hpP)|0,2,rgba(255,255,255,0.12));
  X.fillStyle='#fff';X.font='bold 6px sans-serif';X.textAlign='right';
  X.fillText(P.hp+'/'+tHp(),hpX+hpW+24,uiY+19);
  // MP bar
  X.textAlign='left';X.fillStyle=rgb(140,150,180);X.fillText('MP',sx3,uiY+28);
  R(X,hpX,uiY+24,hpW,5,rgb(10,10,20));
  R(X,hpX,uiY+24,(hpW*(P.mp/tMp()))|0,5,rgb(40,60,180));
  R(X,hpX,uiY+24,(hpW*(P.mp/tMp()))|0,2,rgba(255,255,255,0.12));
  X.fillStyle='#fff';X.font='bold 6px sans-serif';X.textAlign='right';
  X.fillText(P.mp+'/'+tMp(),hpX+hpW+24,uiY+28);
  // XP
  X.textAlign='left';X.fillStyle=rgb(140,150,180);X.font='bold 6px sans-serif';X.fillText('XP',sx3,uiY+37);
  R(X,hpX,uiY+33,hpW,3,rgb(15,12,5));
  R(X,hpX,uiY+33,(hpW*(P.xp/P.xpNext))|0,3,rgb(200,160,40));

  // Additional status info
  X.textAlign='left';X.fillStyle=rgb(220,195,105);X.font='bold 6px sans-serif';
  X.fillText(P.gold+'G',sx3+120,uiY+9);
  // Equipment name
  var wep=getEq('weapon');if(wep){X.fillStyle=rgb(140,150,180);X.font='6px sans-serif';X.fillText(wep.name,sx3+120,uiY+19);}

  // ── 7. BATTLE MESSAGE ──
  if(B.txt&&(B.phase==='animate'||B.phase==='enemy_turn')){
    drawFFBox(60,uiY-16,NW-120,14);
    X.fillStyle='rgba(0,0,0,0.5)';X.font='bold 7px sans-serif';X.textAlign='center';
    X.fillText(B.txt,NW/2+1,uiY-6);
    X.fillStyle='#fff';X.fillText(B.txt,NW/2,uiY-7);
  }
}

// ═══ UPDATE ═══
function updE(){var dx=0,dy=0;if(In.u()){dy=-1;P.dir='up';}if(In.d()){dy=1;P.dir='down';}if(In.l()){dx=-1;P.dir='left';}if(In.r()){dx=1;P.dir='right';}if(dx&&dy){dx*=.707;dy*=.707;}
  var spd=In.run()?2:1.2;P.moving=dx!==0||dy!==0;if(P.moving){P.animTimer++;if(P.animTimer>8){P.animTimer=0;P.walkFrame=(P.walkFrame+1)%4;}}
  var nx=P.x+dx*spd,ny=P.y+dy*spd;
  if(!isWall(nx-4,P.y-4)&&!isWall(nx+4,P.y-4)&&!isWall(nx-4,P.y+4)&&!isWall(nx+4,P.y+4))P.x=nx;
  if(!isWall(P.x-4,ny-4)&&!isWall(P.x+4,ny-4)&&!isWall(P.x-4,ny+4)&&!isWall(P.x+4,ny+4))P.y=ny;
  AREAS[curArea].exits.forEach(function(ex){if(Math.sqrt((P.x-(ex.x*T+T/2))*(P.x-(ex.x*T+T/2))+(P.y-(ex.y*T+T/2))*(P.y-(ex.y*T+T/2)))<T)loadArea(ex.to,ex.px,ex.py);});
  if(In.act()){K[' ']=0;K.enter=0;tA=0;mapN.forEach(function(n){if(Math.sqrt((P.x-(n.x*T+T/2))*(P.x-(n.x*T+T/2))+(P.y-(n.y*T+T/2))*(P.y-(n.y*T+T/2)))<T*2)interactNPC(n);});}
  if(P.moving&&encCD<=0&&Math.random()<AREAS[curArea].encounterRate){var cnt=1+~~(Math.random()*2),ids=[];for(var i=0;i<cnt;i++)ids.push(AREAS[curArea].encounters[~~(Math.random()*AREAS[curArea].encounters.length)]);startB(ids);}
  if(encCD>0)encCD--;if(In.mn()){K.escape=0;K.tab=0;tM=0;openMn();}}
function interactNPC(n){if(n.requireFlag&&!P.storyFlags[n.requireFlag]){startD([{speaker:n.name,text:"..."}]);return;}
  var dlg=n.triggerEvent&&!P.storyFlags[n.triggerEvent+'_d']?n.dialog_before||n.dialog:n.triggerEvent&&P.storyFlags[n.triggerEvent+'_d']?n.dialog_after||[{speaker:n.name,text:"..."}]:n.dialog;
  startD(dlg,function(){if(n.heals){P.hp=tHp();P.mp=tMp();showN('Healed!');}
    if(n.setFlag)P.storyFlags[n.setFlag]=1;
    if(n.giveItem&&!P.storyFlags[n.id+'_g']){if(WEAPONS[n.giveItem]){P.equipment.weapon=n.giveItem;showN('Got '+WEAPONS[n.giveItem].name);}else P.inventory.push(n.giveItem);P.storyFlags[n.id+'_g']=1;}
    if(n.giveHead&&!P.storyFlags[n.id+'_gH']){P.equipment.head=n.giveHead;P.storyFlags[n.id+'_gH']=1;}
    if(n.giveBody&&!P.storyFlags[n.id+'_gB']){P.equipment.body=n.giveBody;P.storyFlags[n.id+'_gB']=1;}
    if(n.giveAccessory&&!P.storyFlags[n.id+'_gA']){P.equipment.accessory=n.giveAccessory;P.storyFlags[n.id+'_gA']=1;}
    if(n.triggerEvent&&!P.storyFlags[n.triggerEvent+'_d']){P.storyFlags[n.triggerEvent+'_d']=1;if(n.triggerEvent==='master_death')P.chapter=3;
      if(n.triggerEvent==='holy_knight'){P.storyFlags.is_holy_knight=1;P.chapter=5;['holy_light','guardian_angel','rebuke','miraculous_cure','archangel_fury'].forEach(function(s){if(P.knownSkills.indexOf(s)<0)P.knownSkills.push(s);});showN('Holy Knight!');}}
    if(n.triggerBattle)setTimeout(function(){startB([n.triggerBattle]);},500);
    if(n.shop)openShop(n);});}
function openShop(n){var allDB=Object.assign({},WEAPONS,ARMOR,HEADGEAR,ACCESSORIES);var items=(n.shopItems||[]).map(function(id){var it=allDB[id];return{id:id,item:it,price:~~({common:20,uncommon:60,rare:150,epic:400,legendary:1000,divine:2000}[it.rarity]||50)};});
  var idx=0;(function next(){if(idx>=items.length)return;var l=items[idx];startD([{speaker:'Shop',text:l.item.name+' - '+l.price+'G'}],function(){if(P.gold>=l.price){P.gold-=l.price;P.inventory.push(l.id);showN('Bought!');}else showN('No gold!');idx++;if(idx<items.length)setTimeout(next,300);});})();}

    h2+='<div style="display:flex;gap:3px;margin-bottom:4px;flex-wrap:wrap">';
    ['body','mind','combat','agility'].forEach(function(tid){
      var tr=TREE[tid];var ac=curTree===tid;var cnt=0;Object.keys(tr.nodes).forEach(function(n){if(hasNode(tid,n))cnt++;});
      h2+='<div class="stab'+(ac?' sta':'')+'" data-tree="'+tid+'" style="cursor:pointer;padding:2px 6px;font-size:.65em;border:1px solid '+(ac?tr.color:'rgba(100,140,200,.2)')+';border-radius:2px;color:'+(ac?tr.color:'#889')+'">'+tr.icon+' '+tr.name+' <span style="font-size:.8em;color:'+(ac?'#fff':'#556')+'">'+cnt+'/'+Object.keys(tr.nodes).length+'</span></div>';
    });
    h2+='</div>';
    // Tab bar - weapon trees
    h2+='<div style="margin:4px 0 2px;font-size:.55em;color:#889;text-transform:uppercase">Weapon (SP: <span style="color:#d4a853;font-weight:bold">'+P.weapSP+'</span>)</div>';
    h2+='<div style="display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap">';
    ['katana','faith','miracles','polearm'].forEach(function(tid){
      var tr=TREE[tid];var ac=curTree===tid;var cnt=0;Object.keys(tr.nodes).forEach(function(n){if(hasNode(tid,n))cnt++;});
      h2+='<div class="stab'+(ac?' sta':'')+'" data-tree="'+tid+'" style="cursor:pointer;padding:2px 6px;font-size:.65em;border:1px solid '+(ac?tr.color:'rgba(100,140,200,.2)')+';border-radius:2px;color:'+(ac?tr.color:'#889')+'">'+tr.icon+' '+tr.name+' <span style="font-size:.8em;color:'+(ac?'#fff':'#556')+'">'+cnt+'/'+Object.keys(tr.nodes).length+'</span></div>';
    });
    h2+='</div>';
    // Render current tree
    var tr2=TREE[curTree];if(tr2){
      h2+='<div style="border:1px solid rgba(100,140,200,.15);border-radius:3px;padding:6px;background:rgba(0,0,0,.3);max-height:280px;overflow-y:auto">';
      h2+='<div style="font-size:.75em;color:'+tr2.color+';margin-bottom:6px;font-weight:bold">'+tr2.icon+' '+tr2.name+' Tree</div>';
      // Find max row
      var maxRow=0;Object.keys(tr2.nodes).forEach(function(nid){maxRow=Math.max(maxRow,tr2.nodes[nid].row);});
      // Grid: rows x 3 cols
      for(var row=0;row<=maxRow;row++){
        h2+='<div style="display:flex;gap:3px;margin-bottom:3px">';
        var rowNodes=[];Object.keys(tr2.nodes).forEach(function(nid){if(tr2.nodes[nid].row===row)rowNodes.push(nid);});
        rowNodes.sort(function(a,b){return tr2.nodes[a].col-tr2.nodes[b].col;});
        // Pad empty cols
        var colMap={};rowNodes.forEach(function(nid){colMap[tr2.nodes[nid].col]=nid;});
        for(var col=0;col<3;col++){
          var nid=colMap[col];
          if(!nid){h2+='<div style="flex:1"></div>';continue;}
          var nd=tr2.nodes[nid];
          var owned=hasNode(curTree,nid);
          var canU=canUnlock(curTree,nid);
          var locked=!owned&&!canU;
          var isCap=nd.name.indexOf('❖')>=0;
          var bg=owned?'rgba(80,200,80,.12)':canU?'rgba(200,160,60,.12)':'rgba(40,40,55,.4)';
          var bdr=owned?'rgba(80,200,80,.4)':canU?tr2.color:'rgba(60,60,80,.2)';
          var tc=owned?'#8f8':canU?'#d4a853':'#556';
          h2+='<div class="snd" data-tree="'+curTree+'" data-node="'+nid+'" style="flex:1;padding:4px;border:1px solid '+bdr+';border-radius:3px;background:'+bg+';cursor:'+(canU?'pointer':'default')+(isCap?';border-width:2px':'')+'">';
          h2+='<div style="font-size:.65em;color:'+tc+';font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+nd.name+'</div>';
          h2+='<div style="font-size:.52em;color:'+(owned?'#afa':locked?'#445':'#bba')+'">'+nd.desc+'</div>';
          h2+='<div style="font-size:.48em;color:'+(owned?'#6a6':locked?'#334':'#997')+'">'+(owned?'✓ Learned':'Cost: '+nd.cost+' SP')+'</div>';
          h2+='</div>';
        }
        h2+='</div>';
        // Connection indicators
        if(row<maxRow)h2+='<div style="text-align:center;color:rgba(100,140,200,.15);font-size:.5em;line-height:1;margin:1px 0">↓ ↓ ↓</div>';
      }
      h2+='</div>';
    }
    // Known skills list (compact)
    h2+='<div style="margin-top:6px;border-top:1px solid rgba(100,140,200,.15);padding-top:4px"><div style="font-size:.55em;color:#889;margin-bottom:3px">KNOWN SKILLS ('+P.knownSkills.length+')</div>';
    h2+='<div style="display:flex;flex-wrap:wrap;gap:2px">';
    P.knownSkills.forEach(function(id){var sk=SKILL_DB[id];h2+='<div style="font-size:.6em;padding:1px 4px;background:rgba(60,80,120,.15);border:1px solid rgba(80,100,140,.2);border-radius:2px;color:#aab">'+sk.name+(sk.mpCost?' <span style="color:#68a">'+sk.mpCost+'</span>':'')+'</div>';});
    h2+='</div></div>';
    el.innerHTML=h2;
    // Attach tree tab handlers
    el.querySelectorAll('.stab').forEach(function(tab){tab.onclick=function(){el.dataset.curTree=tab.dataset.tree;renderMn('skills');};});
    // Attach node click handlers
    el.querySelectorAll('.snd').forEach(function(nd){nd.onclick=function(){var tr3=nd.dataset.tree,nid2=nd.dataset.node;if(canUnlock(tr3,nid2)){unlockNode(tr3,nid2);}};});
  }
  else if(t==='story')el.innerHTML='<div class="mti">STORY</div><div style="line-height:1.7;font-size:.82em;color:#bba"><b style="color:#d4a853">'+cn()+'</b></div>';}
window.eqI=function(id,i){var allDB=Object.assign({},WEAPONS,ARMOR,HEADGEAR,ACCESSORIES);var it=allDB[id];if(!it)return;var s=it.type==='weapon'?'weapon':it.type;var old=P.equipment[s];P.equipment[s]=id;if(P.genEquipped)P.genEquipped[s]=null;P.inventory.splice(i,1);if(old)P.inventory.push(old);showN('Equipped!');Object.keys(SC).forEach(function(k){if(k.charAt(0)==='u'||k.substring(0,2)==='bu')delete SC[k];});renderMn('equip');};
window.eqGen=function(uid){var it=getGenItem(uid);if(!it)return;var s=it.type;
  if(!P.genEquipped)P.genEquipped={weapon:null,body:null,head:null,accessory:null};
  // Unequip current generated item (put back in pool)
  var oldGenUid=P.genEquipped[s];
  // Unequip current fixed item
  var oldFixed=P.equipment[s];
  if(oldFixed)P.inventory.push(oldFixed);
  P.equipment[s]=null;
  P.genEquipped[s]=uid;
  showN('Equipped '+it.name+'!');Object.keys(SC).forEach(function(k){if(k.charAt(0)==='u'||k.substring(0,2)==='bu')delete SC[k];});renderMn('equip');
};

// ═══ HUD ═══
function updHUD(){var h=document.getElementById('hud');if(gs==='explore'||gs==='dialog'){h.style.display='block';document.getElementById('hhp').style.width=(P.hp/tHp()*100)+'%';document.getElementById('hht').textContent='HP '+P.hp+'/'+tHp();document.getElementById('hmp').style.width=(P.mp/tMp()*100)+'%';document.getElementById('hxp').style.width=(P.xp/P.xpNext*100)+'%';document.getElementById('hlv').textContent='Lv'+P.level;document.getElementById('har').textContent=AREAS[curArea].name;document.getElementById('hgl').textContent=P.gold+'G';}else h.style.display='none';}

// ═══ MAIN ═══
function loop(){requestAnimationFrame(loop);fr++;
  try{if(gs==='explore'){updE();drawExplore();}else if(gs==='dialog'){updD();drawExplore();}else if(gs==='battle'){updB();drawBattle();}else if(gs==='menu')drawExplore();}catch(e){}
  try{updHUD();}catch(e){}if(nTm>0){nTm--;if(nTm<=0)document.getElementById('ntf').classList.remove('sh');}}
function start(){try{document.getElementById('ts').classList.add('h');initP();loadArea('countryside');gs='explore';
  setTimeout(function(){startD([{speaker:'',text:"A young rabbit dreams of adventure..."},{speaker:'Usagi',text:"Today I leave."},{speaker:'',text:"WASD:Move SPACE:Talk ESC:Menu SHIFT:Run"}]);},500);}catch(e){}}
document.getElementById('sb').onclick=start;document.getElementById('sb').ontouchstart=function(e){e.preventDefault();start();};
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&gs==='title')start();});
loop();
</script>
